<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Hours Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-5xl mx-auto p-6">
        <header class="flex justify-between items-center mb-10 bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-3xl font-black text-slate-800">TimeSheet Hub</h1>
                <p class="text-slate-500">Track 7:48 AM to 5:32 PM as 9.44</p>
            </div>
            <button onclick="openNewSheetModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-200">
                <i class="fas fa-plus mr-2"></i> New Sheet
            </button>
        </header>

        <div id="sheetsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center z-40 p-4">
        <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 id="modalTitle" class="text-xl font-bold">New Timesheet</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
            </div>

            <div id="step1" class="p-12 text-center">
                <h3 class="text-2xl font-bold mb-4">Sheet Name</h3>
                <input type="text" id="sheetNameInput" placeholder="January Sheet" class="w-full max-w-md mx-auto block border-2 border-slate-200 rounded-2xl p-4 text-lg focus:border-blue-500 outline-none">
                <button onclick="goToStep2()" class="mt-8 bg-slate-800 text-white px-12 py-4 rounded-2xl font-bold">Next</button>
            </div>

            <div id="step2" class="hidden flex-col h-full overflow-hidden">
                <div class="p-6 bg-slate-50 grid grid-cols-2 md:grid-cols-5 gap-3">
                    <input type="date" id="dateIn" class="border rounded-xl p-3">
                    <input type="time" id="timeIn" class="border rounded-xl p-3">
                    <input type="date" id="dateOut" class="border rounded-xl p-3">
                    <input type="time" id="timeOut" class="border rounded-xl p-3">
                    <button onclick="addEntry()" class="bg-emerald-500 text-white rounded-xl font-bold">Add</button>
                </div>
                <div class="flex-1 overflow-y-auto p-6">
                    <table class="w-full text-left">
                        <thead class="border-b text-slate-400 text-xs">
                            <tr><th class="pb-3">IN</th><th class="pb-3">OUT</th><th class="pb-3 text-right">HH.MM</th><th></th></tr>
                        </thead>
                        <tbody id="modalTableBody" class="divide-y"></tbody>
                    </table>
                </div>
                <div class="p-8 border-t flex justify-between items-center bg-slate-50">
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase">Total (HH.MM)</p>
                        <span id="modalGrandTotal" class="text-4xl font-black text-blue-600">0.00</span>
                    </div>
                    <button onclick="showConfirmPopup()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold shadow-xl">Save Sheet</button>
                </div>
            </div>
        </div>
    </div>

    <div id="confirmPopup" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center z-[60]">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-bold mb-2">Confirm Save?</h3>
            <p class="text-slate-500 mb-8">This will sync your timesheet to the database.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmPopup()" class="flex-1 p-3 bg-slate-100 rounded-xl font-bold">Cancel</button>
                <button onclick="finalSave()" class="flex-1 p-3 bg-blue-600 text-white rounded-xl font-bold">Confirm</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJHqn-KIG7ntbsc9OZik7hf5lhObx7Ecg",
            authDomain: "hours-80ce8.firebaseapp.com",
            projectId: "hours-80ce8",
            storageBucket: "hours-80ce8.firebasestorage.app",
            messagingSenderId: "425460400755",
            appId: "1:425460400755:web:9fbbe205d914e8f84c2006",
            measurementId: "G-4V0GE6QB9N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentEntries = [];
        let editingId = null;

        // FIXED LOGIC: HH.MM Format
        function calculateHHMM(startStr, endStr) {
            const diff = new Date(endStr) - new Date(startStr);
            const totalMins = Math.floor(diff / 60000);
            const h = Math.floor(totalMins / 60);
            const m = totalMins % 60;
            return `${h}.${m.toString().padStart(2, '0')}`;
        }

        function sumHHMM(entries) {
            let totalMins = 0;
            entries.forEach(e => {
                const parts = e.duration.split('.');
                totalMins += (parseInt(parts[0]) * 60) + parseInt(parts[1]);
            });
            return `${Math.floor(totalMins / 60)}.${(totalMins % 60).toString().padStart(2, '0')}`;
        }

        window.openNewSheetModal = () => {
            editingId = null; currentEntries = [];
            document.getElementById('sheetNameInput').value = '';
            document.getElementById('modalTitle').innerText = "New Sheet";
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('modalOverlay').classList.remove('hidden');
            renderTable();
        };

        window.goToStep2 = () => {
            if (!document.getElementById('sheetNameInput').value) return;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('step2').classList.add('flex');
        };

        window.addEntry = () => {
            const dIn = document.getElementById('dateIn').value, tIn = document.getElementById('timeIn').value;
            const dOut = document.getElementById('dateOut').value, tOut = document.getElementById('timeOut').value;
            if (!dIn || !tIn || !dOut || !tOut) return;

            const duration = calculateHHMM(`${dIn}T${tIn}`, `${dOut}T${tOut}`);
            currentEntries.push({ dIn, tIn, dOut, tOut, duration });
            renderTable();
        };

        function renderTable() {
            const body = document.getElementById('modalTableBody');
            body.innerHTML = '';
            currentEntries.forEach((e, i) => {
                body.innerHTML += `<tr class="text-sm"><td class="py-3">${e.dIn} ${e.tIn}</td><td class="py-3">${e.dOut} ${e.tOut}</td><td class="py-3 text-right font-bold">${e.duration}</td><td class="text-right"><button onclick="removeRow(${i})" class="text-red-400 p-2"><i class="fas fa-trash"></i></button></td></tr>`;
            });
            document.getElementById('modalGrandTotal').innerText = sumHHMM(currentEntries);
        }

        window.removeRow = (i) => { currentEntries.splice(i, 1); renderTable(); };
        window.closeModal = () => document.getElementById('modalOverlay').classList.add('hidden');
        window.showConfirmPopup = () => document.getElementById('confirmPopup').classList.remove('hidden');
        window.closeConfirmPopup = () => document.getElementById('confirmPopup').classList.add('hidden');

        window.finalSave = async () => {
            const data = {
                name: document.getElementById('sheetNameInput').value,
                entries: currentEntries,
                total: document.getElementById('modalGrandTotal').innerText,
                date: new Date()
            };
            try {
                if (editingId) await updateDoc(doc(db, "timesheets", editingId), data);
                else await addDoc(collection(db, "timesheets"), data);
                closeConfirmPopup(); closeModal();
            } catch (e) { alert("Save Failed! Check Firebase Rules."); }
        };

        onSnapshot(collection(db, "timesheets"), (snap) => {
            const list = document.getElementById('sheetsList');
            list.innerHTML = '';
            snap.forEach(d => {
                const s = d.data();
                list.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 hover:shadow-xl transition-all cursor-pointer group relative">
                        <button onclick="event.stopPropagation(); deleteSheet('${d.id}')" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-trash-alt text-xs"></i></button>
                        <div onclick="openSheet('${d.id}')">
                            <h4 class="font-bold text-lg mb-4">${s.name}</h4>
                            <p class="text-xs text-slate-400 uppercase font-bold">Total Duration</p>
                            <p class="text-3xl font-black text-slate-800">${s.total}</p>
                        </div>
                    </div>`;
            });
        });

        window.openSheet = async (id) => {
            const snap = await getDoc(doc(db, "timesheets", id));
            const s = snap.data();
            editingId = id; currentEntries = s.entries;
            document.getElementById('sheetNameInput').value = s.name;
            document.getElementById('modalTitle').innerText = "Edit Sheet";
            goToStep2();
            document.getElementById('modalOverlay').classList.remove('hidden');
            renderTable();
        };

        window.deleteSheet = async (id) => {
            if (confirm("Delete this sheet permanently?")) {
                await deleteDoc(doc(db, "timesheets", id));
            }
        };
    </script>
</body>
</html>
