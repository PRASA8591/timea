<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro TimeSheet - Enterprise Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @media print {
            @page { margin: 0.5cm; size: A4; }
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; display: block !important; font-size: 9pt; }
            .no-print { display: none !important; }
        }
        .custom-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-animate { animation: modalIn 0.2s ease-out; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <div id="customDialog" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm hidden flex items-center justify-center z-[200] p-4 no-print">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl modal-animate">
            <div id="dialogIcon" class="text-4xl mb-4"></div>
            <h3 id="dialogTitle" class="text-2xl font-black mb-2 text-slate-800"></h3>
            <p id="dialogMessage" class="text-slate-500 mb-8 font-medium"></p>
            <div class="flex gap-3" id="dialogButtons"></div>
        </div>
    </div>

    <div id="passwordPromptModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm hidden flex items-center justify-center z-[150] p-4 no-print">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl modal-animate">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-key text-2xl"></i>
            </div>
            <h3 class="text-xl font-black mb-2">Update Password</h3>
            <p id="passPromptUser" class="text-slate-500 text-sm mb-6"></p>
            <input type="text" id="passPromptInput" class="w-full border-2 rounded-xl p-3 focus:border-emerald-500 outline-none mb-6 text-center font-bold text-lg" placeholder="New Password">
            <div class="flex gap-3">
                <button onclick="closeModal('passwordPromptModal')" class="flex-1 bg-slate-100 py-3 rounded-xl font-bold">Cancel</button>
                <button id="passSaveBtn" class="flex-1 bg-emerald-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-emerald-100">Update</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-4 md:p-8 no-print">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tighter">TimeSheet <span class="text-blue-600">Pro</span></h1>
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mt-1">Logged as: <span id="displayUsername" class="text-blue-600"></span></p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button id="adminBtn" onclick="openAdminModal()" class="hidden bg-slate-800 hover:bg-black text-white px-5 py-3 rounded-xl font-bold transition flex items-center">
                    <i class="fas fa-users-cog mr-2"></i> Users
                </button>
                <button onclick="openNewSheetModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-blue-100 transition">
                    <i class="fas fa-plus mr-2"></i> New Sheet
                </button>
                <button onclick="logout()" class="bg-red-50 text-red-600 px-4 py-3 rounded-xl font-bold hover:bg-red-500 hover:text-white transition">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <div id="sheetsList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-40 p-2 md:p-4 no-print">
        <div class="bg-white w-full max-w-5xl rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[95vh] md:h-auto md:max-h-[90vh] modal-animate">
            <div class="p-5 border-b flex justify-between items-center">
                <h2 class="text-xl font-black text-slate-800">Editor</h2>
                <div class="flex gap-2">
                    <button onclick="printDocument()" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-600 hover:bg-slate-800 hover:text-white transition"><i class="fas fa-print"></i></button>
                    <button onclick="exportPDF()" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-600 hover:bg-red-500 hover:text-white transition"><i class="fas fa-file-pdf"></i></button>
                    <button onclick="closeModal('modalOverlay')" class="w-10 h-10 rounded-xl bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition"><i class="fas fa-times"></i></button>
                </div>
            </div>

            <div id="step1" class="p-10 text-center">
                <h3 class="text-2xl font-black mb-4">Project Name</h3>
                <input type="text" id="sheetNameInput" class="w-full max-w-md mx-auto block border-2 rounded-2xl p-4 text-center font-bold text-lg outline-none focus:border-blue-500">
                <button onclick="goToStep2()" class="mt-8 bg-blue-600 text-white px-12 py-4 rounded-2xl font-bold shadow-xl">Continue</button>
            </div>

            <div id="step2" class="hidden flex-col h-full overflow-hidden">
                <div class="p-4 bg-slate-50 border-b grid grid-cols-2 md:grid-cols-5 gap-3">
                    <div><label class="text-[10px] font-bold text-slate-400 block mb-1">START DATE</label><input type="date" id="dateIn" class="w-full border rounded-xl p-3 outline-none"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 block mb-1">START TIME</label><input type="time" id="timeIn" class="w-full border rounded-xl p-3 outline-none"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 block mb-1">END DATE</label><input type="date" id="dateOut" class="w-full border rounded-xl p-3 outline-none"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 block mb-1">END TIME</label><input type="time" id="timeOut" class="w-full border rounded-xl p-3 outline-none"></div>
                    <div class="flex items-end"><button onclick="addEntry()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold">Add Entry</button></div>
                </div>
                <div class="flex-1 overflow-auto bg-white custom-scroll">
                    <table class="w-full text-left">
                        <thead class="bg-white sticky top-0 border-b z-10 text-[10px] font-black uppercase text-slate-400">
                            <tr><th class="p-4">Start</th><th class="p-4">End</th><th class="p-4 text-right">Duration (HH.MM)</th><th class="p-4 text-center">Action</th></tr>
                        </thead>
                        <tbody id="modalTableBody" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
                <div class="p-5 border-t flex justify-between items-center bg-slate-50">
                    <div><p class="text-[10px] font-black text-slate-400">TOTAL TIME (BASE-60)</p><span id="modalGrandTotal" class="text-4xl font-black text-blue-600">00:00</span></div>
                    <button onclick="finalSave()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold shadow-xl">Save to Cloud</button>
                </div>
            </div>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] modal-animate">
            <div class="p-6 border-b flex justify-between items-center bg-slate-900 text-white">
                <h2 class="text-xl font-black">User Management</h2>
                <button onclick="closeModal('adminModal')" class="text-slate-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 overflow-y-auto bg-slate-50">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                    <input type="text" id="newUsername" placeholder="Username" class="border p-3 rounded-xl outline-none">
                    <input type="text" id="newPassword" placeholder="Password" class="border p-3 rounded-xl outline-none">
                    <select id="newRole" class="border p-3 rounded-xl outline-none"><option value="user">User</option><option value="admin">Admin</option></select>
                    <button onclick="createUser()" class="bg-blue-600 text-white rounded-xl font-bold">Add User</button>
                </div>
                <table class="w-full text-left bg-white rounded-2xl overflow-hidden shadow-sm">
                    <thead class="bg-slate-100 text-[10px] font-black"><tr><th class="p-4">User</th><th class="p-4">Role</th><th class="p-4 text-right">Actions</th></tr></thead>
                    <tbody id="adminUserTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="printArea" class="hidden">
        <h1 id="printSheetName" style="font-size: 20pt; font-weight: 900; margin-bottom: 20px;"></h1>
        <table style="width: 100%; border-collapse: collapse;">
            <thead><tr style="border-bottom: 2px solid black;"><th>Start</th><th>End</th><th align="right">Duration</th></tr></thead>
            <tbody id="printTableBody"></tbody>
        </table>
        <div style="text-align: right; margin-top: 30px;">
            <p style="font-size: 10pt;">TOTAL CALCULATION (HH:MM)</p>
            <h2 id="printGrandTotal" style="font-size: 25pt; font-weight: 900;"></h2>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, where, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp({ apiKey: "AIzaSyBJHqn-KIG7ntbsc9OZik7hf5lhObx7Ecg", authDomain: "hours-80ce8.firebaseapp.com", projectId: "hours-80ce8" });
        const db = getFirestore(app);
        const session = JSON.parse(sessionStorage.getItem('sessionUser'));
        if (!session) window.location.href = 'index.html';
        document.getElementById('displayUsername').innerText = session.username;
        if (session.role === 'admin') document.getElementById('adminBtn').classList.remove('hidden');

        let currentEntries = [];
        let editingId = null;
        window.cachedSheets = {};

        // --- TIME ENGINE FIX (HH.MM to Base-60) ---
        function calculateTotalTime(entries) {
            let totalMinutes = 0;
            entries.forEach(e => {
                const parts = e.duration.split('.');
                const hours = parseInt(parts[0]) || 0;
                const minutes = parseInt(parts[1]) || 0;
                totalMinutes += (hours * 60) + minutes;
            });
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        // --- CUSTOM POPUPS ---
        window.uiDialog = (title, message, type = 'alert', cb = null) => {
            document.getElementById('dialogTitle').innerText = title;
            document.getElementById('dialogMessage').innerText = message;
            const icon = document.getElementById('dialogIcon');
            icon.innerHTML = type === 'alert' ? '<i class="fas fa-info-circle text-blue-500"></i>' : '<i class="fas fa-trash-alt text-red-500"></i>';
            const btns = document.getElementById('dialogButtons');
            btns.innerHTML = type === 'alert' ? 
                `<button onclick="closeDialog()" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold">OK</button>` :
                `<button onclick="closeDialog()" class="flex-1 bg-slate-100 py-3 rounded-xl font-bold">Cancel</button><button id="confBtn" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">Confirm</button>`;
            if(type === 'confirm') document.getElementById('confBtn').onclick = () => { closeDialog(); if(cb) cb(); };
            document.getElementById('customDialog').classList.remove('hidden');
        };
        window.closeDialog = () => document.getElementById('customDialog').classList.add('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        // --- CORE LOGIC ---
        const sheetQ = session.role === 'admin' ? collection(db, "timesheets") : query(collection(db, "timesheets"), where("accessList", "array-contains", session.username));
        onSnapshot(sheetQ, (snap) => {
            const list = document.getElementById('sheetsList');
            list.innerHTML = '';
            snap.forEach(d => {
                const s = d.data();
                window.cachedSheets[d.id] = s;
                list.innerHTML += `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 hover:shadow-xl transition-all cursor-pointer relative group" onclick="openSheet('${d.id}')">
                    <div class="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100 transition">
                        <button onclick="event.stopPropagation(); deleteSheet('${d.id}')" class="w-8 h-8 rounded-full bg-red-50 text-red-500"><i class="fas fa-trash text-[10px]"></i></button>
                    </div>
                    <h4 class="font-bold text-lg text-slate-800 mb-4">${s.name}</h4>
                    <div class="flex justify-between items-end">
                        <span class="text-3xl font-black text-blue-600">${s.total}</span>
                        <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">${s.accessList[0]}</span>
                    </div>
                </div>`;
            });
        });

        window.openSheet = (id) => {
            const s = window.cachedSheets[id];
            editingId = id; currentEntries = s.entries || [];
            document.getElementById('sheetNameInput').value = s.name;
            goToStep2();
            document.getElementById('modalOverlay').classList.remove('hidden');
            renderEntries();
        };

        window.openNewSheetModal = () => {
            editingId = null; currentEntries = [];
            document.getElementById('sheetNameInput').value = '';
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('modalOverlay').classList.remove('hidden');
            renderEntries();
        };

        window.goToStep2 = () => {
            if(!document.getElementById('sheetNameInput').value.trim()) return;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden').classList.add('flex');
        };

        window.addEntry = () => {
            const d1 = document.getElementById('dateIn').value, t1 = document.getElementById('timeIn').value;
            const d2 = document.getElementById('dateOut').value, t2 = document.getElementById('timeOut').value;
            if(!d1 || !t1 || !d2 || !t2) return uiDialog("Error", "All fields required", "alert");
            
            // Calculate HH.MM for this entry
            const diffMs = new Date(`${d2}T${t2}`) - new Date(`${d1}T${t1}`);
            const totalMins = Math.floor(diffMs / 60000);
            const h = Math.floor(totalMins / 60);
            const m = totalMins % 60;
            currentEntries.push({ d1, t1, d2, t2, duration: `${h}.${String(m).padStart(2, '0')}` });
            renderEntries();
        };

        function renderEntries() {
            document.getElementById('modalTableBody').innerHTML = currentEntries.map((e, i) => `
                <tr class="text-sm">
                    <td class="p-4 font-bold">${e.d1} <span class="text-slate-300 font-normal">${e.t1}</span></td>
                    <td class="p-4 font-bold">${e.d2} <span class="text-slate-300 font-normal">${e.t2}</span></td>
                    <td class="p-4 text-right font-black text-slate-700">${e.duration}</td>
                    <td class="p-4 text-center">
                        <button onclick="removeRow(${i})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
            document.getElementById('modalGrandTotal').innerText = calculateTotalTime(currentEntries);
        }

        window.removeRow = (i) => { currentEntries.splice(i, 1); renderEntries(); };

        window.finalSave = async () => {
            const total = calculateTotalTime(currentEntries);
            const payload = {
                name: document.getElementById('sheetNameInput').value,
                entries: currentEntries,
                total: total,
                updatedAt: new Date().toISOString()
            };
            if(editingId) await updateDoc(doc(db, "timesheets", editingId), payload);
            else {
                payload.accessList = [session.username];
                await addDoc(collection(db, "timesheets"), payload);
            }
            closeModal('modalOverlay');
            uiDialog("Saved", "Time sheet successfully updated", "alert");
        };

        window.deleteSheet = (id) => uiDialog("Delete", "Remove this sheet permanently?", "confirm", async () => await deleteDoc(doc(db, "timesheets", id)));

        // --- ADMIN / USERS ---
        window.openAdminModal = () => { document.getElementById('adminModal').classList.remove('hidden'); fetchUsers(); };
        async function fetchUsers() {
            const snap = await getDocs(collection(db, "users"));
            const table = document.getElementById('adminUserTable');
            table.innerHTML = '';
            snap.forEach(d => {
                const u = d.data();
                table.innerHTML += `<tr class="border-b">
                    <td class="p-4 font-bold">${u.username}</td>
                    <td class="p-4 uppercase text-[10px] text-slate-400 font-black">${u.role}</td>
                    <td class="p-4 text-right">
                        <button onclick="showResetPrompt('${d.id}', '${u.username}')" class="text-blue-500 mr-4"><i class="fas fa-key"></i></button>
                        ${u.username !== session.username ? `<button onclick="deleteUser('${d.id}')" class="text-red-400"><i class="fas fa-trash"></i></button>` : ''}
                    </td>
                </tr>`;
            });
        }

        window.showResetPrompt = (id, uname) => {
            document.getElementById('passPromptUser').innerText = "Target: " + uname;
            document.getElementById('passwordPromptModal').classList.remove('hidden');
            document.getElementById('passSaveBtn').onclick = async () => {
                const np = document.getElementById('passPromptInput').value;
                if(!np) return;
                await updateDoc(doc(db, "users", id), { password: np });
                closeModal('passwordPromptModal');
                uiDialog("Success", "Password Updated", "alert");
            };
        };

        window.logout = () => { sessionStorage.removeItem('sessionUser'); window.location.href = 'index.html'; };

        // --- PRINT ---
        window.printDocument = () => {
            document.getElementById('printSheetName').innerText = document.getElementById('sheetNameInput').value;
            document.getElementById('printTableBody').innerHTML = currentEntries.map(e => `
                <tr style="border-bottom: 1px solid #eee;"><td>${e.d1} ${e.t1}</td><td>${e.d2} ${e.t2}</td><td align="right">${e.duration}</td></tr>`).join('');
            document.getElementById('printGrandTotal').innerText = calculateTotalTime(currentEntries);
            window.print();
        };

    </script>
</body>
</html>
